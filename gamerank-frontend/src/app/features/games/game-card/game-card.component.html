<article class="game-card"
         (click)="clicked.emit()"
         (keydown.enter)="clicked.emit()"
         tabindex="0"
         role="button"
         [attr.aria-label]="'Ver detalhes de ' + game.title">

  <!-- ══ COVER ══ -->
  <div class="cover" [style.background]="game.coverGradient">

    <!-- Cover image -->
    <img *ngIf="game.coverImage"
         [src]="game.coverImage"
         [alt]="game.title"
         class="cover-img"
         loading="lazy">

    <!-- Grid overlay -->
    <div class="cover-grid"></div>

    <!-- Bottom ambient glow -->
    <div class="cover-ambient"
         [style.background]="'radial-gradient(ellipse 100% 55% at 50% 100%,' + game.accentColor + '28 0%,transparent 100%)'">
    </div>

    <!-- Scan line animation -->
    <div class="cover-scan"></div>

    <!-- Big initial letter (fallback when no image) -->
    <div *ngIf="!game.coverImage" class="cover-letter" [style.color]="game.accentColor">{{ initial }}</div>

    <!-- Genre badge (top-left) -->
    <span class="cover-badge"
          [style.color]="game.accentColor"
          [style.background]="badgeBg"
          [style.borderColor]="badgeBorder">
      {{ game.genre }}
    </span>

    <!-- Release year (top-right) -->
    <span *ngIf="game.releaseYear" class="cover-year">{{ game.releaseYear }}</span>

    <!-- Hover overlay -->
    <div class="cover-overlay">
      <div class="overlay-line"></div>
      <div class="overlay-cta" [style.borderColor]="game.accentColor + '60'" [style.color]="game.accentColor">
        Ver análise →
      </div>
    </div>

  </div><!-- /cover -->

  <!-- ══ INFO ══ -->
  <div class="card-info">

    <h3 class="card-title">{{ game.title }}</h3>
    <p class="card-dev">{{ game.developer }}</p>

    <div class="card-meta">

      <!-- Stars + rating -->
      <div class="stars-row" (mouseleave)="onStarLeave()">
        <span *ngFor="let star of [1,2,3,4,5]"
              class="star star-interactive"
              [class.star-on]="star <= activeStars"
              [class.star-off]="star > activeStars"
              [class.star-hover]="hoverStar > 0 && star <= hoverStar"
              (mouseenter)="onStarHover(star)"
              (click)="onStarClick(star, $event)">★</span>
        <span *ngIf="hoverStar > 0" class="rating-hover-label">{{ hoverLabel }}</span>
        <span *ngIf="hoverStar === 0 && game.avgRating" class="rating-num">{{ game.avgRating }}</span>
        <span *ngIf="hoverStar === 0 && !game.avgRating" class="rating-none">—</span>
      </div>

      <!-- AI Sentiment chip -->
      <div class="ai-chip" [ngClass]="sentimentClass">
        <span class="chip-dot"></span>
        <span>IA {{ sentimentText }}</span>
      </div>

    </div>
  </div>

</article>
