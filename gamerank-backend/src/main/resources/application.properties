# Nome do aplicativo
spring.application.name=gamerank-backend

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://mongo:27017/gamerankdb}
spring.data.mongodb.database=gamerankdb
spring.data.mongodb.auto-index-creation=true

# Logging Mongo
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=INFO

# URL do microservi\u00E7o Python
RECOMMENDATION_SERVICE_URL=http://localhost:5000/recommendations

# Datas no JSON
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
